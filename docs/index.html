<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width">
<style>body{font-family:monospace;background:#2f4d2f;color:#f2b888;padding:20px;text-align:center}
h1{color:#fdd179;font-size:2em}h2{color:#fee1b8}.s{font-size:1.2em;margin:8px}</style>
</head><body><h1>Supply Shock</h1><h2 id="phase">Loading...</h2>
<div class="s" id="money"></div><div class="s" id="buildings"></div>
<div class="s" id="spent"></div>
<script>
const B="https://ekddyatakcbjigfbcggk.supabase.co/rest/v1/game_stats?select=*&id=eq.1";
const K="sb_publishable_HCljEapFwGbpxlHd7fVJ0w_aYm9zlW_";
async function u(){try{let r=await fetch(B,{headers:{"apikey":K}});let d=(await r.json())[0];
document.getElementById("phase").textContent=d.phase;
document.getElementById("money").textContent="Money: $"+d.money.toFixed(2);
document.getElementById("buildings").textContent="DPs: "+d.dps+" | Stores: "+d.gs;
document.getElementById("spent").textContent="Spent: $"+d.spent.toFixed(2);
}catch(e){}}setInterval(u,2000);u();
</script></body></html>
